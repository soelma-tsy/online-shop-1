services:
  web:
    image: nginx
    ports:
      - 81:80
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./:/var/www/html

  php-fpm:
    build: /Users/soelmatsy/PhpstormProjects/online-shop/docker
    volumes:
      - ./:/var/www/html

  db:
    image: postgres:13
    ports:
      - 5432:5432
    volumes:
      - ./docker/postgres/data:/var/lib/postresql/data
    environment:
      - POSTGRES_DB=${POSTGRES_DB}
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}