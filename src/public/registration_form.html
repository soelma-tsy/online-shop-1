<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>online-shop регистрация</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(145deg, #f0f7ff 0%, #e0eafe 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        form {
            max-width: 520px;
            width: 100%;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 48px;
            box-shadow: 0 30px 60px -20px rgba(0, 40, 100, 0.25);
            padding: 2.5rem 2.5rem 1.5rem;
            border: 1px solid rgba(255,255,255,0.6);
        }

        .container h1 {
            font-size: 2.5rem;
            font-weight: 800;
            background: linear-gradient(135deg, #1a3b5c, #2b6c9e);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 0.3rem;
        }

        .container p {
            color: #2c4b6b;
            font-size: 1rem;
            margin-bottom: 1.5rem;
            opacity: 0.8;
        }

        hr {
            border: none;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(43, 108, 158, 0.2), transparent);
            margin: 1.8rem 0;
        }

        label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #1e3b5a;
            margin-bottom: 0.4rem;
        }

        input {
            width: 100%;
            padding: 1rem 1.2rem;
            font-size: 1rem;
            background: rgba(255,255,255,0.8);
            border: 2px solid rgba(120, 170, 220, 0.4);
            border-radius: 30px;
            outline: none;
            transition: all 0.2s;
            color: #1a3b5c;
            font-weight: 500;
            margin-bottom: 1.5rem;
        }

        input:focus {
            border-color: #2b6c9e;
            background: white;
            box-shadow: 0 6px 16px -8px rgba(43, 108, 158, 0.4);
        }

        input::placeholder {
            color: #8aa9c9;
            font-weight: 400;
            opacity: 0.7;
        }

        .registerbtn {
            width: 100%;
            background: linear-gradient(115deg, #1e4b6e, #2b6c9e);
            border: none;
            padding: 1rem;
            border-radius: 40px;
            color: white;
            font-size: 1.2rem;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 0 16px 30px -10px #1e4f77;
            transition: all 0.2s;
            margin: 1rem 0;
        }

        .registerbtn:hover {
            transform: scale(1.02);
            background: linear-gradient(115deg, #235d86, #327bb3);
            box-shadow: 0 20px 35px -8px #1d4a70;
        }

        .container p a {
            color: #2b6c9e;
            font-weight: 600;
            text-decoration: none;
            border-bottom: 2px solid transparent;
            transition: border-color 0.2s;
        }

        .container p a:hover {
            border-bottom-color: #2b6c9e;
        }

        .container.signin {
            text-align: center;
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 2px dashed rgba(43, 108, 158, 0.2);
        }

        .container.signin p {
            color: #1e3b5a;
            font-size: 1rem;
            margin-bottom: 0;
        }

        .container.signin a {
            color: #2b6c9e;
            font-weight: 700;
            text-decoration: none;
            margin-left: 0.5rem;
            border-bottom: 2px solid transparent;
            transition: border-color 0.2s;
        }

        .container.signin a:hover {
            border-bottom-color: #2b6c9e;
        }

        @media (max-width: 480px) {
            form {
                padding: 1.8rem 1.5rem;
                border-radius: 36px;
            }

            .container h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>️ Регистрация</h1>
    <p>Пожалуйста, введите данные для создания вашей учетной записи.</p>
    <form action="handle_registration_form.php" method="GET">

        <label>Имя:</label>
        <input type="text" name="name" placeholder="Введите имя" required>

        <label>Email:</label>
        <input type="email" name="email" placeholder="Введите email" required>

        <label>Пароль:</label>
        <input type="password" name="psw" placeholder="Придумайте пароль" required>

        <label>Повторите пароль:</label>
        <input type="password" name="psw_repeat" placeholder="Повторите пароль" required>

        <button type="submit" class="registerbtn">Зарегистрироваться</button>
    </form>
</div>
</body>
</html>
